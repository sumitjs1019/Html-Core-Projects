<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project</title>
</head>
<body>
  <h1>calender</h1>
  <p id="demo"></p>
  <script>
let month;
let num=new Date().getMonth();
switch(num){
    case 0:
        month="January";
        break;
    case 1:
        month="February";
        break;
    case 2:
        month="March";
        break;
    case 3 :
        month="April";
        break;
    case 4:
        month="May";
        break;
    case 5:
        month="June";
        break;
    case 6:
        month="July";
        break;
    case 7:
        month="August";
        break;
    case 8 :
        month="September";
        break;
    case 9:
        month="October";
        break;
    case 10:
        month="November";
        break;
    case 11:
        month="December";
        break;
}
document.getElementById("demo").innerHTML = "Current month: " +month;
</script>
</body>
</html>
